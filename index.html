<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2330;
    --ink-soft:#3A4250;
    --paper:#F2EFE9;
    --card:#FFFFFF;
    --line:#E4DFD6;
    --muted:#8A8F98;
    --accent:#FF6B4A;       /* coral – été / action */
    --accent-press:#E85534;
    --go:#15A06B;           /* validé */
    --go-soft:#E5F4EE;
    --pub:#5B6472;          /* publié */
    --fb:#1877F2;
    --ig:#C13584;
    --li:#0A66C2;
    --radius:16px;
    --shadow:0 1px 2px rgba(27,35,48,.06),0 8px 24px rgba(27,35,48,.07);
    --display:"Bricolage Grotesque", system-ui, sans-serif;
    --body:"Inter", system-ui, sans-serif;
    --mono:"DM Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    padding:0 0 64px;
    line-height:1.45;
  }
  .wrap{max-width:620px;margin:0 auto;padding:0 16px}

  /* ---------- Header ---------- */
  header{
    padding:22px 0 14px;
    position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--paper) 78%, rgba(242,239,233,0));
  }
  .brandrow{display:flex;align-items:center;gap:11px}
  .mark{
    width:40px;height:40px;border-radius:11px;flex:none;
    background:var(--ink);color:#fff;display:grid;place-items:center;
    font-family:var(--display);font-weight:800;font-size:19px;
    box-shadow:var(--shadow);
  }
  .brandtext h1{
    font-family:var(--display);font-weight:800;font-size:18px;
    margin:0;letter-spacing:-.01em;line-height:1.05;
  }
  .brandtext p{margin:2px 0 0;font-size:12px;color:var(--muted)}
  .stripe{height:3px;border-radius:3px;margin-top:13px;
    background:repeating-linear-gradient(90deg,var(--accent) 0 18px,transparent 18px 30px)}

  /* ---------- Next-up banner ---------- */
  .nextup{
    margin:16px 0 6px;background:var(--ink);color:#fff;
    border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;
  }
  .nextup .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:#FFB7A6;margin:0 0 6px}

const NET = {fb:{c:'nf',n:'F',label:'Facebook',o:'o-fb',url:'https://www.facebook.com/'},
             ig:{c:'ni',n:'I',label:'Instagram',o:'o-ig',url:'https://www.instagram.com/'},
             li:{c:'nl',n:'in',label:'LinkedIn',o:'o-li',url:'https://www.linkedin.com/feed/'}};

let DATA = [];
let filter = 'all';
const openTabs = {}; // id -> net key

// ---------- storage ----------
async function load(){
  try{
    if(window.storage){
      const r = await window.storage.get(KEY);
      if(r && r.value){ DATA = JSON.parse(r.value); return; }
    }
  }catch(e){ /* first run / not available */ }
  DATA = JSON.parse(JSON.stringify(SEED));
  save();
}
async function save(){
  try{ if(window.storage){ await window.storage.set(KEY, JSON.stringify(DATA), false); } }catch(e){}
}

// ---------- helpers ----------
function fmtDate(iso){
  const d = new Date(iso);
  const diff = Math.round((d - TODAY)/86400000);
  if(diff===0) return "aujourd'hui";
  if(diff===1) return "demain";
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'),1900);
}
function copy(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('Copié ✓')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast('Copié ✓');}catch(e){toast('Copie impossible');}
  document.body.removeChild(ta);
}

// ---------- render ----------
function nextUp(){
  const up = DATA.filter(p=>p.status!=='Publié').sort((a,b)=>a.date.localeCompare(b.date))[0];
  const el = document.getElementById('nextup');
  if(!up){ el.innerHTML=''; return; }
  el.innerHTML = `<div class="nextup">
    <span class="plane">🚐</span>
    <p class="eyebrow">Prochaine publication</p>
    <h2>${esc(up.title)}</h2>
    <div class="when">${fmtDate(up.date)} · ${up.heure} · ${up.nets.map(n=>NET[n].label).join(' + ')}</div>
  </div>`;
}

function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function render(){
  nextUp();
  const list = document.getElementById('list');
  const items = DATA.filter(p=>filter==='all'||p.status===filter)
                    .sort((a,b)=>a.date.localeCompare(b.date));
  if(!items.length){ list.innerHTML=`<p class="note">Rien ici pour ce filtre.</p>`; return; }
  list.innerHTML = items.map(card).join('');
}

function statusStamp(s){
  if(s==='Validé') return `<span class="stamp s-ok">Validé</span>`;
  if(s==='Publié') return `<span class="stamp s-pub">Publié</span>`;
  return `<span class="stamp s-todo">À valider</span>`;
}

function card(p){
  const active = openTabs[p.id] || p.nets[0];
  const tabs = p.nets.map(n=>`<button class="tab" data-tab="${p.id}|${n}" role="tab" aria-selected="${n===active}">${NET[n].label}</button>`).join('');
  const text = p[active]||'(version non rédigée pour ce réseau)';
  const opens = p.nets.map(n=>`<button class="btn b-open ${NET[n].o}" data-open="${NET[n].url}">↗ ${NET[n].label}</button>`).join('');
  return `<article class="ticket" data-id="${p.id}">
    <div class="thead" data-toggle="${p.id}">
      <div class="stub">
        <span class="d">${new Date(p.date).getDate()}</span>
        <span class="m">${p.mois}</span>
        <span class="t">${p.heure}</span>
      </div>
      <div class="tbody">
        <div class="ttype">${esc(p.type)}</div>
        <div class="ttitle">${esc(p.title)}</div>
        <div class="meta">
          <div class="nets">${p.nets.map(n=>`<span class="ndot ${NET[n].c}">${NET[n].n}</span>`).join('')}</div>
          ${p.prio?`<span class="prio">Prioritaire</span>`:''}
          ${statusStamp(p.status)}
        </div>
      </div>
      <div class="caret">▾</div>
    </div>
    <div class="detail">
      <div class="tabs" role="tablist">${tabs}</div>
      <div class="field-label">Texte (modifiable)</div>
      <textarea data-edit="${p.id}|${active}" rows="7">${esc(text)}</textarea>
      <div class="field-label">Appel à l'action</div>
      <div class="txt">${esc(p.cta)}</div>
      <div class="field-label">Hashtags</div>
      <div class="hashbox">${esc(p.hashtags)}</div>
      <div class="field-label">Visuel à préparer</div>
      <div class="visual">${esc(p.visual)}</div>

      <div class="actions">
        <button class="btn b-copy" data-copy="${p.id}|${active}">📋 Copier (texte + hashtags)</button>
        ${p.status!=='Validé'?`<button class="btn b-ok" data-ok="${p.id}">✓ Valider</button>`:''}
        <button class="btn b-pub" data-pub="${p.id}">${p.status==='Publié'?'✓ Publié':'Marquer publié'}</button>
      </div>
      <div class="opens">${opens}</div>

      <div class="guide">
        <div class="field-label">Guider Claude (sans pavé)</div>
        <div class="guide-row">
          <input type="text" data-guideinput="${p.id}" placeholder="ex : raccourcis · ajoute le prix 89 € · ton plus fun">
          <button class="btn" data-guide="${p.id}">Copier la consigne</button>
        </div>
        <div class="guide-hint">Ta consigne est copiée → colle-la dans le chat, je régénère cette publi.</div>
      </div>
    </div>
  </article>`;
}

// ---------- events (delegated) ----------
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-toggle],[data-tab],[data-copy],[data-ok],[data-pub],[data-open],[data-guide]');
  if(!t) return;

  if(t.dataset.toggle){
    if(e.target.closest('.detail')) return;
    const art = t.closest('.ticket'); art.classList.toggle('open'); return;
  }
  if(t.dataset.tab){
    const [id,net] = t.dataset.tab.split('|'); openTabs[id]=net;
    const art = t.closest('.ticket'); render();
    document.querySelector(`.ticket[data-id="${id}"]`)?.classList.add('open');
    return;
  }
  if(t.dataset.copy){
    const [id,net] = t.dataset.copy.split('|');
    const p = DATA.find(x=>x.id===id);
    copy((p[net]||'') + '\n\n' + p.hashtags); return;
  }
  if(t.dataset.ok){
    const p = DATA.find(x=>x.id===t.dataset.ok); p.status='Validé'; save(); render();
    document.querySelector(`.ticket[data-id="${p.id}"]`)?.classList.add('open'); toast('Validé ✓'); return;
  }
  if(t.dataset.pub){
    const p = DATA.find(x=>x.id===t.dataset.pub);
    p.status = p.status==='Publié' ? 'Validé' : 'Publié'; save(); render();
    document.querySelector(`.ticket[data-id="${p.id}"]`)?.classList.add('open'); return;
  }
  if(t.dataset.open){ window.open(t.dataset.open,'_blank','noopener'); return; }
  if(t.dataset.guide){
    const id = t.dataset.guide;
    const p = DATA.find(x=>x.id===id);
    const net = openTabs[id]||p.nets[0];
    const inp = document.querySelector(`[data-guideinput="${id}"]`);
    const instr = (inp.value||'').trim();
    if(!instr){ inp.focus(); toast('Écris ta consigne d\'abord'); return; }
    copy(`[Modif Cockpit] Publi : « ${p.title} » · Réseau : ${NET[net].label}\nConsigne : ${instr}`);
    inp.value='';
    return;
  }
});

document.addEventListener('input', e=>{
  if(e.target.dataset.edit){
    const [id,net] = e.target.dataset.edit.split('|');
    const p = DATA.find(x=>x.id===id); p[net]=e.target.value; save();
  }
});

document.getElementById('chips').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(!c) return;
  filter = c.dataset.f;
  [...document.querySelectorAll('.chip')].forEach(x=>x.setAttribute('aria-pressed', x===c));
  render();
});

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  if(confirm('Réinitialiser toutes les publications aux versions d\'origine ? Tes modifs seront perdues.')){
    DATA = JSON.parse(JSON.stringify(SEED)); await save(); render(); toast('Réinitialisé');
  }
});

document.getElementById('notifBtn').addEventListener('click', async ()=>{
  if(!('Notification' in window)){ toast('Notifs non supportées ici'); return; }
  let perm = Notification.permission;
  if(perm!=='granted'){ perm = await Notification.requestPermission(); }
  if(perm==='granted'){
    const due = DATA.filter(p=>p.status!=='Publié').sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(due){ new Notification('À publier — '+fmtDate(due.date), {body:due.title+' · '+due.heure}); }
    toast('Tu seras averti à l\'ouverture de l\'appli ✓');
  } else { toast('Notifs refusées'); }
});

// ---------- init ----------
(async ()=>{ await load(); render(); })();
</script>
</body>
</html>
